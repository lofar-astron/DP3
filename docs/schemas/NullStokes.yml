description: >-
  Modifies the visibilities of the input measurement set such that one or more Stokes parameters are set to zero.
inputs:
  type:
    type: string
    doc: Case-insensitive step type; must be 'nullstokes'.
    default: nullstokes
  modify_i:
    type: boolean
    doc: >-
      Set Stokes I to zero.
    default: false
  modify_q:
    type: boolean
    doc: >-
      Set Stokes Q to zero.
    default: false
  modify_u:
    type: boolean
    doc: >-
      Set Stokes U to zero.
    default: false
  modify_v:
    type: boolean
    doc: >-
      Set Stokes V to zero.
    default: false
